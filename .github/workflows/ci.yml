name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Cancel in-progress runs for the same ref when a new commit lands.
# Saves Actions minutes on rapid-fire pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default. The validate job only reads source.
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://placeholder:placeholder@placeholder:5432/placeholder
      AUTH_SECRET: ci-placeholder-not-a-real-secret
      # ANTHROPIC_API_KEY: tests mock @anthropic-ai/sdk so no real
      # network call is made. The placeholder lets `isLlmConfigured()`
      # return true so tests exercising the LLM-primary code path
      # take the LLM branch (not the unconfigured failure branch).
      ANTHROPIC_API_KEY: ci-placeholder-mocked-in-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Generate the Prisma client up-front so `typecheck` and `test`
      # (which run before `build`) can resolve `@prisma/client` types.
      # `npm run build` will re-generate, but that's a fast no-op.
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
